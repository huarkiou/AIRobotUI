name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.1.0)"
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        shell: bash
        run: |
          set -e
          TAG="v${{ inputs.version }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          echo "## Changes in $TAG" > CHANGELOG.md
          echo "" >> CHANGELOG.md

          group() {
            local title="$1"
            shift
            local lines
            lines=$(git log --no-merges --format="- %s (%h)" "$@" 2>/dev/null || true)
            if [ -n "$lines" ]; then
              echo "### $title" >> CHANGELOG.md
              echo "$lines" >> CHANGELOG.md
              echo "" >> CHANGELOG.md
            fi
          }

          # Determine commit range
          PREV_TAG=$(git tag --sort=-v:refname 2>/dev/null | grep -E '^v[0-9]' | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE=""
          fi

          group "Features" $RANGE --grep="^feat"
          group "Fixes" $RANGE --grep="^fix"
          group "Other" $RANGE -E --grep="^(chore|docs|ci|refactor|build)"

          cat CHANGELOG.md

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv run python -m PyInstaller --onefile --windowed --clean --name TrayForge --icon assets/icon.ico --runtime-tmpdir "%LOCALAPPDATA%/TrayForge/runtime" src/main.pyw

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/TrayForge.exe
          tag_name: ${{ steps.changelog.outputs.tag }}
          name: TrayForge ${{ steps.changelog.outputs.tag }}
          body_path: CHANGELOG.md
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
